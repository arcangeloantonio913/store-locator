<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Brands | Store Locator Ufficiale</title>
    <style>
        /* Variabili base per coerenza visiva */
        :root {
            --bg-black: #0a0a0a;
            --accent-gold: #d4af37;
            --dark-brown: #2d1b15;
            --text-light: #f4f4f4;
        }
        body {
            margin: 0;
            background-color: var(--bg-black);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Arial, sans-serif; /* Placeholder font */
            line-height: 1.6;
        }
        section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2, h3 { color: var(--accent-gold); }
        .hero { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <header>
        <nav>
            </nav>
    </header>

    <section id="hero" class="hero">
        <div>
            <h1>L'Esecuzione dell'Eccellenza</h1>
            <p>Selezioniamo e distribuiamo i migliori marchi sul territorio.</p>
            <a href="#locator" style="color: var(--bg-black); background: var(--accent-gold); padding: 15px 30px; text-decoration: none; font-weight: bold; text-transform: uppercase;">Trova uno Store</a>
        </div>
    </section>

    <section id="chi-siamo">
        <h2>La Nostra Agenzia</h2>
        </section>

    <section id="marchi">
        <h2>I Marchi Trattati</h2>
        <div class="brands-grid">
            </div>
    </section>

    <section id="locator">
        <h2>Store Locator</h2>
        </section>

    <section id="contatti">
        <h2>Contattaci</h2>
        </section>

    <footer>
        </footer>

</body>
</html>
